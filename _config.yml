title: "Sandeep Salwan"
author: "Sandeep"
description: "AI Engineer and GenAI Technical Intern at Scale AI. Northeastern CS student specializing in AI, ML, and full‑stack development."
permalink: /:title/
lang: "en"
excerpt_separator: "\n\n\n"
date_format: "%B %d, %Y"

# Layout
show_excerpts: false
show_frame: true
show_sidebar: false
minimal: false

# Menu
navigation:
  - {file: "index.html", title: "Home"}
  - {file: "about.md", title: "About"}
  - {file: "projects.md", title: "Projects"}
  - {file: "blog.md", title: "Blog"}

external:
  - {title: Mail, icon: envelope, url: "mailto:salwan.s@northeastern.edu"}
  - {title: Github, icon: github, url: "https://github.com/sandeepsalwan1"}
  - {title: Linkedin, icon: linkedin, url: "https://www.linkedin.com/in/sandeep-salwan/"}

comments:

plugins:
 - jekyll-feed

# SEO
url: "https://sandeeps.tech"
twitter_username: "_SandeepSalwan"

source: .
destination: ./_site

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      permalink: "/blog/:slug/"
      image: "/assets/images/s.jpg"

sass:
  sass_dir: _sass
  style: compressed

extra_css:
  - /assets/css/custom.css
